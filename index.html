<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Взаиморасчёты</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    padding: 20px 16px 16px;
    text-align: center;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header p { font-size: 11px; opacity: 0.5; margin-top: 4px; }

  .cards {
    display: flex;
    gap: 10px;
    margin: 16px 12px;
  }
  .card {
    flex: 1;
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    color: white;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .card.debt { background: linear-gradient(135deg, #e74c3c, #c0392b); }
  .card.tel  { background: linear-gradient(135deg, #e67e22, #d35400); }
  .card .label { font-size: 10px; opacity: 0.85; text-transform: uppercase; letter-spacing: 1px; }
  .card .amount { font-size: 20px; font-weight: 800; margin-top: 4px; white-space: nowrap; }

  .table-wrap {
    margin: 0 12px 20px;
    background: white;
    border-radius: 14px;
    overflow-x: auto;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    white-space: nowrap;
  }
  th {
    background: #f8f9fa;
    padding: 8px 10px;
    text-align: right;
    font-size: 10px;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #e8e8e8;
    border-right: 1px solid #e8e8e8;
  }
  th:first-child { text-align: left; }
  th:last-child { border-right: none; }
  td {
    padding: 10px 10px;
    text-align: right;
    border-bottom: 1px solid #f0f0f0;
    border-right: 1px solid #f0f0f0;
    white-space: nowrap;
  }
  td:first-child { text-align: left; color: #888; }
  td:last-child { border-right: none; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .sale   { color: #2c3e50; font-weight: 600; }
  .green  { color: #27ae60; font-weight: 600; }
  .red    { color: #e74c3c; font-weight: 700; }
  .orange { color: #e67e22; font-weight: 700; }
  .muted  { color: #ccc; }
</style>
</head>
<body>

<header>
  <h1>Взаиморасчёты</h1>
  <p>Обновлено: 17.06.2026 08:32</p>
</header>

<div class="cards">
  <div class="card debt">
    <div class="label">Касса</div>
    <div class="amount">91 570 ₽</div>
  </div>
  <div class="card tel">
    <div class="label">Телефон</div>
    <div class="amount">57 822 ₽</div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Дата</th>
        <th>Продажа</th>
        <th>Приход</th>
        <th>Касса</th>
        <th>Тел</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>16 июн</td><td><span class="sale">89 550₽</span></td><td><span class="muted">—</span></td><td><span class="red">91 570₽</span></td><td><span class="orange">57 822₽</span></td></tr>
      <tr><td>15 июн</td><td><span class="muted">—</span></td><td><span class="green">105 100₽</span></td><td><span class="red">2 020₽</span></td><td><span class="orange">57 822₽</span></td></tr>
    </tbody>
  </table>
</div>

</body>
</html>
