<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Взаиморасчёты</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    padding: 24px 20px 20px;
    text-align: center;
  }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { font-size: 12px; opacity: 0.5; margin-top: 6px; }

  .cards {
    display: flex;
    gap: 12px;
    margin: 20px 16px;
  }
  .card {
    flex: 1;
    border-radius: 14px;
    padding: 18px 14px;
    text-align: center;
    color: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
  .card.debt { background: linear-gradient(135deg, #e74c3c, #c0392b); }
  .card.tel  { background: linear-gradient(135deg, #e67e22, #d35400); }
  .card .label { font-size: 11px; opacity: 0.85; text-transform: uppercase; letter-spacing: 1px; }
  .card .amount { font-size: 24px; font-weight: 800; margin-top: 6px; }

  .table-wrap {
    margin: 0 16px 24px;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    background: #f8f9fa;
    padding: 9px 12px;
    text-align: right;
    font-size: 11px;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #e8e8e8;
    border-right: 1px solid #e8e8e8;
  }
  th:first-child { text-align: left; }
  th:last-child { border-right: none; }
  td {
    padding: 11px 12px;
    text-align: right;
    border-bottom: 1px solid #f0f0f0;
    border-right: 1px solid #f0f0f0;
  }
  td:first-child { text-align: left; font-size: 12px; color: #888; }
  td:last-child { border-right: none; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .sale   { color: #2c3e50; font-weight: 600; }
  .green  { color: #27ae60; font-weight: 600; }
  .red    { color: #e74c3c; font-weight: 700; }
  .orange { color: #e67e22; font-weight: 700; }
  .muted  { color: #ccc; }
</style>
</head>
<body>

<header>
  <h1>Взаиморасчёты</h1>
  <p>Обновлено: 16.06.2026 21:54</p>
</header>

<div class="cards">
  <div class="card debt">
    <div class="label">Касса</div>
    <div class="amount">91 570 ₽</div>
  </div>
  <div class="card tel">
    <div class="label">Телефон</div>
    <div class="amount">57 822 ₽</div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Дата</th>
        <th>Продажа</th>
        <th>Приход</th>
        <th>Касса</th>
        <th>Тел</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>16 июн 2026</td><td><span class="sale">89 550 ₽</span></td><td><span class="muted">—</span></td><td><span class="red">91 570 ₽</span></td><td><span class="orange">57 822 ₽</span></td></tr>
      <tr><td>15 июн 2026</td><td><span class="muted">—</span></td><td><span class="green">105 100 ₽</span></td><td><span class="red">2 020 ₽</span></td><td><span class="orange">57 822 ₽</span></td></tr>
    </tbody>
  </table>
</div>

</body>
</html>
